---
apiVersion: v1
kind: Service
metadata:
  name: prefill-headless
spec:
  publishNotReadyAddresses: true
  clusterIP: None
  selector:
    app: prefill
  ports:
  - port: 30000
    name: http
  - port: 8998
    name: bootstrap
---
apiVersion: v1
kind: Service
metadata:
  name: decode-headless
spec:
  publishNotReadyAddresses: true
  clusterIP: None
  selector:
    app: decode
  ports:
  - port: 30000
    name: http
  - port: 8998
    name: bootstrap
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-prefill
spec:
  selector:
    app: prefill
  ports:
  - name: http
    port: 30000
    targetPort: 30000
  - name: bootstrap
    port: 8998
    targetPort: 8998
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-decode
spec:
  selector:
    app: decode
  ports:
  - name: http
    port: 30000
    targetPort: 30000
  - name: bootstrap
    port: 8998
    targetPort: 8998
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prefill
  labels:
    app: prefill
    role: prefill
spec:
  serviceName: prefill-headless
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: prefill
  template:
    metadata:
      labels:
        app: prefill
        role: prefill
        sglang-metrics: "true"
      annotations:
        sglang.ai/bootstrap-port: "8998"
        prometheus.io/scrape: "true"
        prometheus.io/port: "30000"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        node.kubernetes.io/instance-type: ml.p5en.48xlarge
      containers:
      - name: sglang
        image: 687752207838.dkr.ecr.us-east-2.amazonaws.com/sgl-dev-cu13:20260403072950
        imagePullPolicy: Always
        env:
        - name: NCCL_DEBUG
          value: INFO
        - name: FI_PROVIDER
          value: efa
        - name: FI_EFA_USE_DEVICE_RDMA
          value: "1"
        - name: SGLANG_DISAGGREGATION_NIXL_BACKEND
          value: LIBFABRIC
        command:
        - sh
        - -c
        - |
          python3 -m sglang.launch_server \
            --model-path /jfs/moonshotai-Kimi-K2.5 \
            --host 0.0.0.0 \
            --port 30000 \
            --tp-size 8 \
            --ep-size 8 \
            --attention-backend flashinfer \
            --disaggregation-mode prefill \
            --disaggregation-transfer-backend nixl \
            --disaggregation-bootstrap-port 8998 \
            --mem-fraction-static 0.92 \
            --trust-remote-code \
            --enable-hierarchical-cache \
            --hicache-ratio 2 \
            --hicache-io-backend kernel
        ports:
        - containerPort: 30000
          name: http
        - containerPort: 8998
          name: bootstrap
        volumeMounts:
        - name: shm
          mountPath: /dev/shm
        - name: jfs-storage
          mountPath: /jfs
        resources:
          limits:
            nvidia.com/gpu: 8
            vpc.amazonaws.com/efa: 8
            memory: "1900Gi"
            cpu: "180"
        readinessProbe:
          httpGet:
            path: /health
            port: 30000
          initialDelaySeconds: 180
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 64Gi
      - name: jfs-storage
        persistentVolumeClaim:
          claimName: s3-claim
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: decode
  labels:
    app: decode
    role: decode
spec:
  serviceName: decode-headless
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: decode
  template:
    metadata:
      labels:
        app: decode
        role: decode
        sglang-metrics: "true"
      annotations:
        sglang.ai/bootstrap-port: "8998"
        prometheus.io/scrape: "true"
        prometheus.io/port: "30000"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        node.kubernetes.io/instance-type: ml.p5en.48xlarge
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: prefill
            topologyKey: kubernetes.io/hostname
      containers:
      - name: sglang
        image: 687752207838.dkr.ecr.us-east-2.amazonaws.com/sgl-dev-cu13:20260403072950
        imagePullPolicy: Always
        env:
        - name: NCCL_DEBUG
          value: INFO
        - name: FI_PROVIDER
          value: efa
        - name: FI_EFA_USE_DEVICE_RDMA
          value: "1"
        - name: SGLANG_DISAGGREGATION_NIXL_BACKEND
          value: LIBFABRIC
        command:
        - sh
        - -c
        - |
          python3 -m sglang.launch_server \
            --model-path /jfs/moonshotai-Kimi-K2.5 \
            --host 0.0.0.0 \
            --port 30000 \
            --tp-size 8 \
            --ep-size 8 \
            --attention-backend flashinfer \
            --disaggregation-mode decode \
            --disaggregation-transfer-backend nixl \
            --disaggregation-bootstrap-port 8998 \
            --mem-fraction-static 0.92 \
            --trust-remote-code \
            --tool-call-parser kimi_k2 \
            --reasoning-parser kimi_k2
        ports:
        - containerPort: 30000
          name: http
        - containerPort: 8998
          name: bootstrap
        volumeMounts:
        - name: shm
          mountPath: /dev/shm
        - name: jfs-storage
          mountPath: /jfs
        resources:
          limits:
            nvidia.com/gpu: 8
            vpc.amazonaws.com/efa: 8
            memory: "1900Gi"
            cpu: "180"
        readinessProbe:
          httpGet:
            path: /health
            port: 30000
          initialDelaySeconds: 180
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 64Gi
      - name: jfs-storage
        persistentVolumeClaim:
          claimName: s3-claim
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sglang-router
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sglang-router
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sglang-router
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sglang-router
subjects:
- kind: ServiceAccount
  name: sglang-router
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sglang-router
  labels:
    app: sglang-router
spec:
  selector:
    matchLabels:
      app: sglang-router
  template:
    metadata:
      labels:
        app: sglang-router
    spec:
      serviceAccountName: sglang-router
      containers:
      - name: router
        image: lmsysorg/sgl-model-gateway:latest
        ports:
        - containerPort: 30000
          name: http
        command:
        - python
        - -m
        - sglang_router.launch_router
        args:
        - --host
        - "0.0.0.0"
        - --port
        - "30000"
        - --pd-disaggregation
        - --prefill
        - http://sglang-prefill.default.svc.cluster.local:30000
        - "8998"
        - --decode
        - http://sglang-decode.default.svc.cluster.local:30000
        - --prefill-policy
        - cache_aware
        - --decode-policy
        - round_robin
        resources:
          requests:
            cpu: "2"
            memory: 4Gi
          limits:
            cpu: "4"
            memory: 8Gi
        readinessProbe:
          httpGet:
            path: /readiness
            port: 30000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-router
spec:
  selector:
    app: sglang-router
  ports:
  - name: http
    port: 30000
    targetPort: 30000
  type: ClusterIP

###############################################################################
#  Prometheus Agent → Amazon Managed Prometheus (AMP)
#
#  前置条件 (只需做一次):
#  1. 确保 EKS 集群已启用 OIDC provider:
#     eksctl utils associate-iam-oidc-provider --cluster <CLUSTER_NAME> --approve
#
#  2. 创建 IAM role (amp-iamproxy-ingest-role) 并绑定到 ServiceAccount:
#     eksctl create iamserviceaccount \
#       --name amp-iamproxy-ingest-service-account \
#       --namespace default \
#       --cluster <CLUSTER_NAME> \
#       --attach-policy-arn arn:aws:iam::aws:policy/AmazonPrometheusRemoteWriteAccess \
#       --approve \
#       --override-existing-serviceaccounts
#
#     或者如果已经手动创建了 amp-iamproxy-ingest-role，
#     确保它的信任策略(Trust Policy)包含该 EKS 集群的 OIDC provider。
###############################################################################

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: amp-iamproxy-ingest-service-account
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::687752207838:role/eksctl-eks-cluster-hypd-0402-1ed4-addon-iamse-Role1-IZVJvopAczbj"
--- 
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-agent
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "endpoints", "services"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-agent
subjects:
- kind: ServiceAccount
  name: amp-iamproxy-ingest-service-account
  namespace: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-agent-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 30s

    scrape_configs:
      - job_name: sglang
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # 只抓取带 prometheus.io/scrape=true 的 pod
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # 只抓取带 sglang-metrics=true label 的 pod
          - source_labels: [__meta_kubernetes_pod_label_sglang_metrics]
            action: keep
            regex: "true"
          # 使用 annotation 中的 port 构建 scrape 地址
          - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+);(.+)
            replacement: ${1}:${2}
          # 使用 annotation 中的 metrics path
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # 添加有用的 labels
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          # 保留 role label (prefill/decode)
          - source_labels: [__meta_kubernetes_pod_label_role]
            target_label: role

    remote_write:
      - url: https://aps-workspaces.us-east-2.amazonaws.com/workspaces/ws-50321b31-5cc7-4f87-9f81-207b1a025d81/api/v1/remote_write
        sigv4:
          region: us-east-2
        queue_config:
          max_samples_per_send: 1000
          max_shards: 200
          capacity: 2500
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-agent
  labels:
    app: prometheus-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-agent
  template:
    metadata:
      labels:
        app: prometheus-agent
    spec:
      serviceAccountName: amp-iamproxy-ingest-service-account
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          - '--storage.tsdb.retention.time=2h'
          - '--enable-feature=agent'
        ports:
        - containerPort: 9090
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: data
          mountPath: /prometheus
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
      volumes:
      - name: config
        configMap:
          name: prometheus-agent-config
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-agent
spec:
  selector:
    app: prometheus-agent
  ports:
  - name: http
    port: 9090
    targetPort: 9090
  type: ClusterIP
